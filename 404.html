<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — SPORTMOMENTE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#060608;--accent:#e8ff4a;--muted:#666;--text:#f2efe9}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.num{font-family:'Bebas Neue',sans-serif;font-size:clamp(120px,25vw,220px);line-height:.8;color:var(--accent);letter-spacing:4px;opacity:.15;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.12}50%{opacity:.22}}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,6vw,52px);letter-spacing:2px;margin:24px 0 16px}
p{color:var(--muted);font-size:15px;line-height:1.7;max-width:380px;margin-bottom:40px}
a{display:inline-block;background:var(--accent);color:#060608;padding:14px 32px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:transform .2s,box-shadow .2s}
a:hover{transform:translateY(-2px);box-shadow:0 16px 36px rgba(232,255,74,.25)}
footer{position:fixed;bottom:24px;font-size:11px;color:rgba(255,255,255,.14)}
</style>
</head>
<body>
<div class="num">404</div>
<h1>Seite nicht gefunden</h1>
<p>Diese Galerie oder Seite existiert nicht (mehr). Vielleicht wurde der Link geändert?</p>
<a href="/">← Zurück zur Startseite</a>
<footer>© 2026 Sportmomente</footer>
</body>
</html>
